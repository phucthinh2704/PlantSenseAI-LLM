		<script>
			(function () {
				const fileBase = "kien-truc-RAG"; // tên file cơ bản
				const scaleDefault = 2; // 2x: gợi ý xuất PNG nét

				function downloadBlob(blob, filename) {
					const a = document.createElement("a");
					a.href = URL.createObjectURL(blob);
					a.download = filename;
					document.body.appendChild(a);
					a.click();
					setTimeout(() => {
						URL.revokeObjectURL(a.href);
						a.remove();
					}, 0);
				}

				// Lấy SVG thực tế trên trang
				function getSvgEl() {
					// Nếu có nhiều SVG, bạn có thể thay querySelector('#id-svg-cua-ban')
					return document.querySelector("svg");
				}

				// Xuất SVG thuần (vector)
				function exportSVG() {
					const svg = getSvgEl();
					if (!svg) {
						alert("Không tìm thấy <svg>");
						return;
					}

					// Clone để thêm namespace, tránh lỗi khi serialize
					const clone = svg.cloneNode(true);
					clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
					clone.setAttribute(
						"xmlns:xlink",
						"http://www.w3.org/1999/xlink"
					);

					const serialized = new XMLSerializer().serializeToString(
						clone
					);
					const blob = new Blob([serialized], {
						type: "image/svg+xml;charset=utf-8",
					});
					downloadBlob(blob, `${fileBase}.svg`);
				}

				// Xuất PNG với scale tuỳ chọn
				function exportPNG(scale = scaleDefault) {
					const svg = getSvgEl();
					if (!svg) {
						alert("Không tìm thấy <svg>");
						return;
					}

					// Lấy kích thước từ viewBox (chuẩn nhất)
					const vb =
						svg.viewBox && svg.viewBox.baseVal
							? svg.viewBox.baseVal
							: {
									x: 0,
									y: 0,
									width: svg.width.baseVal.value,
									height: svg.height.baseVal.value,
							  };

					const width = Math.max(1, vb.width * scale);
					const height = Math.max(1, vb.height * scale);

					// Serialize SVG
					const clone = svg.cloneNode(true);
					clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
					clone.setAttribute(
						"xmlns:xlink",
						"http://www.w3.org/1999/xlink"
					);
					// Đảm bảo nền trắng (nếu muốn trong suốt, bỏ rect nền hoặc đổi fill)
					// Ở sơ đồ của bạn đã có <rect fill="#f8f9fa"> nên OK.

					const svgData = new XMLSerializer().serializeToString(
						clone
					);
					const svgBlob = new Blob([svgData], {
						type: "image/svg+xml;charset=utf-8",
					});
					const url = URL.createObjectURL(svgBlob);

					const img = new Image();
					// Quan trọng: tránh tainted canvas nếu có font/external resource
					img.crossOrigin = "anonymous";
					img.onload = () => {
						try {
							const canvas = document.createElement("canvas");
							canvas.width = width;
							canvas.height = height;

							const ctx = canvas.getContext("2d", {
								alpha: false,
							});
							ctx.imageSmoothingEnabled = true;
							ctx.imageSmoothingQuality = "high";

							// Vẽ hình fit đúng kích thước (scale đã tính theo viewBox)
							ctx.drawImage(img, 0, 0, width, height);

							canvas.toBlob((pngBlob) => {
								if (!pngBlob) {
									alert("Xuất PNG thất bại");
									return;
								}
								downloadBlob(
									pngBlob,
									`${fileBase}-${scale}x.png`
								);
								URL.revokeObjectURL(url);
							}, "image/png");
						} catch (e) {
							console.error(e);
							alert(
								"Có lỗi khi render PNG. Hãy thử xuất SVG rồi đổi qua PNG bằng Inkscape."
							);
							URL.revokeObjectURL(url);
						}
					};
					img.onerror = () => {
						alert("Không tải được dữ liệu SVG để vẽ PNG.");
						URL.revokeObjectURL(url);
					};
					img.src = url;
				}

				document
					.getElementById("btnSvg")
					?.addEventListener("click", exportSVG);
				document
					.getElementById("btnPng")
					?.addEventListener("click", () => exportPNG(2));
			})();
		</script>
	</body>
</html>
